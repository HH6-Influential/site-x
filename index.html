<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>site-x</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      color: #68d391;
      margin-bottom: 2rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #68d391;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f7fafc;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    h1 span { color: #63b3ed; }

    .subtitle {
      color: #718096;
      font-size: 0.875rem;
      margin-bottom: 2.5rem;
    }

    .panel {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .panel-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4a5568;
      margin-bottom: 1rem;
    }

    .steps {
      display: flex;
      align-items: center;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
    }

    .step-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2d3748;
      border: 2px solid #4a5568;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }

    .step.done .step-icon {
      background: #1c3a2a;
      border-color: #68d391;
      color: #68d391;
    }

    .step-label {
      font-size: 0.65rem;
      color: #4a5568;
      text-align: center;
    }

    .step.done .step-label { color: #68d391; }

    .connector {
      flex: 1;
      height: 2px;
      background: #68d391;
      margin-bottom: 1.2rem;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .meta-item {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 1rem;
    }

    .meta-key {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4a5568;
      margin-bottom: 0.35rem;
    }

    .meta-value {
      font-size: 0.85rem;
      color: #a0aec0;
    }

    .meta-value.highlight { color: #63b3ed; }

    /* Upload area */
    .upload-zone {
      border: 1px dashed #2d3748;
      border-radius: 6px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #63b3ed;
      background: #141824;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }

    .upload-zone-text {
      font-size: 0.75rem;
      color: #4a5568;
    }

    .upload-zone-text span {
      color: #63b3ed;
    }

    .upload-zone.has-file .upload-icon { color: #68d391; }
    .upload-zone.has-file .upload-zone-text { color: #68d391; }

    .upload-btn {
      width: 100%;
      margin-top: 0.75rem;
      background: #68d391;
      color: #0f1117;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .upload-btn:disabled {
      background: #2d3748;
      color: #4a5568;
      cursor: not-allowed;
    }

    .upload-btn:not(:disabled):hover { background: #9ae6b4; }

    .status-line {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      min-height: 1rem;
      color: #4a5568;
    }

    .status-line.ok { color: #68d391; }
    .status-line.err { color: #f56565; }
    .status-line.pending { color: #63b3ed; }

    /* Gallery */
    .gallery-empty {
      font-size: 0.75rem;
      color: #4a5568;
      padding: 0.5rem 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
    }

    .gallery-item {
      aspect-ratio: 1;
      border: 1px solid #2d3748;
      border-radius: 6px;
      overflow: hidden;
      background: #0f1117;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="badge">
      <div class="dot"></div>
      deployed &amp; healthy
    </div>

    <h1>site-<span>x</span></h1>
    <p class="subtitle">CI/CD pipeline test — Kamal 2 · Rootless Docker · Tailscale</p>

    <div class="panel">
      <div class="panel-label">Pipeline</div>
      <div class="steps">
        <div class="step done">
          <div class="step-icon">✓</div>
          <div class="step-label">push</div>
        </div>
        <div class="connector"></div>
        <div class="step done">
          <div class="step-icon">✓</div>
          <div class="step-label">build</div>
        </div>
        <div class="connector"></div>
        <div class="step done">
          <div class="step-icon">✓</div>
          <div class="step-label">push image</div>
        </div>
        <div class="connector"></div>
        <div class="step done">
          <div class="step-icon">✓</div>
          <div class="step-label">deploy</div>
        </div>
        <div class="connector"></div>
        <div class="step done">
          <div class="step-icon">✓</div>
          <div class="step-label">health</div>
        </div>
      </div>
    </div>

    <div class="meta" style="margin-bottom:1.5rem;">
      <div class="meta-item">
        <div class="meta-key">registry</div>
        <div class="meta-value highlight">ghcr.io</div>
      </div>
      <div class="meta-item">
        <div class="meta-key">proxy</div>
        <div class="meta-value">kamal-proxy</div>
      </div>
      <div class="meta-item">
        <div class="meta-key">runtime</div>
        <div class="meta-value">rootless docker</div>
      </div>
      <div class="meta-item">
        <div class="meta-key">network</div>
        <div class="meta-value">tailscale</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Upload</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="upload-icon">↑</div>
        <div class="upload-zone-text">drop image or <span>browse</span></div>
      </div>
      <button class="upload-btn" id="uploadBtn" disabled>Upload</button>
      <div class="status-line" id="uploadStatus"></div>
    </div>

    <div class="panel">
      <div class="panel-label">Images</div>
      <div id="gallery"><div class="gallery-empty">no images yet</div></div>
    </div>

  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatus = document.getElementById('uploadStatus');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        uploadZone.classList.add('has-file');
        uploadZone.querySelector('.upload-zone-text').textContent = fileInput.files[0].name;
        uploadBtn.disabled = false;
      }
    });

    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('drag-over');
    });

    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    uploadBtn.addEventListener('click', () => {
      if (!fileInput.files.length) return;

      const formData = new FormData();
      formData.append('image', fileInput.files[0]);

      uploadStatus.textContent = 'uploading...';
      uploadStatus.className = 'status-line pending';
      uploadBtn.disabled = true;

      fetch('/uploads', { method: 'POST', body: formData })
        .then(async r => {
          const msg = await r.text();
          if (r.ok) {
            uploadStatus.textContent = '✓ ' + msg;
            uploadStatus.className = 'status-line ok';
            uploadZone.classList.remove('has-file');
            uploadZone.querySelector('.upload-zone-text').innerHTML = 'drop image or <span>browse</span>';
            fileInput.value = '';
            loadGallery();
          } else {
            uploadStatus.textContent = '✗ ' + msg;
            uploadStatus.className = 'status-line err';
          }
        })
        .catch(err => {
          uploadStatus.textContent = '✗ ' + err.message;
          uploadStatus.className = 'status-line err';
        })
        .finally(() => {
          uploadBtn.disabled = false;
        });
    });

    function loadGallery() {
      fetch('/uploads-list')
        .then(r => r.json())
        .then(files => {
          const gallery = document.getElementById('gallery');
          if (!files.length) {
            gallery.innerHTML = '<div class="gallery-empty">no images yet</div>';
            return;
          }
          gallery.innerHTML = '';
          const grid = document.createElement('div');
          grid.className = 'gallery-grid';
          files.forEach(file => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            const img = document.createElement('img');
            img.src = '/uploads/' + encodeURIComponent(file);
            img.alt = file;
            item.appendChild(img);
            grid.appendChild(item);
          });
          gallery.appendChild(grid);
        })
        .catch(() => {});
    }

    loadGallery();
  </script>
</body>
</html>
