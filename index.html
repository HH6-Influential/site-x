<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Debug Index</title>
	<style>
		body {
			background: #181c20;
			color: #f3f3f3;
			font-family: 'Segoe UI', Arial, sans-serif;
			margin: 0;
			padding: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}
		.container {
			background: #23272b;
			border-radius: 12px;
			box-shadow: 0 4px 24px rgba(0,0,0,0.3);
			padding: 2.5rem 2rem 2rem 2rem;
			max-width: 420px;
			width: 90%;
			margin: 2rem auto;
		}
		h1 {
			color: #4fd1c5;
			margin-bottom: 0.5rem;
			font-size: 2.2rem;
			letter-spacing: 1px;
		}
		.env-info {
			background: #1a2024;
			border-radius: 8px;
			padding: 1rem;
			margin: 1.5rem 0;
			font-size: 1rem;
			word-break: break-all;
		}
		.status {
			color: #f6ad55;
			font-weight: bold;
			margin-bottom: 1rem;
		}
		.footer {
			margin-top: 2rem;
			color: #718096;
			font-size: 0.95rem;
			text-align: center;
		}
		a {
			color: #63b3ed;
			text-decoration: none;
		}
		a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Debug Index</h1>
		<div class="status">Server is running</div>
		<div class="env-info">
			<strong>Environment:</strong> Development<br>
			<strong>Date:</strong> <span id="date"></span><br>
			<strong>User Agent:</strong> <span id="ua"></span>
		</div>
	</div>
	<div class="footer">
		&copy; 2026 Debug Index &mdash; Powered by HH6
	</div>
	<script>
		document.getElementById('date').textContent = new Date().toLocaleString();
		document.getElementById('ua').textContent = navigator.userAgent;
	</script>
</body>
</html>
