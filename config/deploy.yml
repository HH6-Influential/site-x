builder:
  arch: amd64

service: site-x
image: ghcr.io/hh6-influential/site-x

servers:
  web:
    hosts:
      - 100.87.240.99
    options:
      memory: 512m
      cpus: "0.25"
      pids-limit: "128"
      read-only: "true"
      security-opt: "no-new-privileges:true"
      cap-drop: "ALL"
      tmpfs: "/tmp:size=64m"

proxy:
  ssl: true
  host: site-x.example.com
  app_port: 5005
  healthcheck:
    path: /health
    interval: 5
    timeout: 3

registry:
  server: ghcr.io
  username: HH6-Influential
  password:
    - KAMAL_REGISTRY_PASSWORD

volumes:
  - /srv/sites/site-x/uploads:/app/uploads
  - /srv/sites/site-x/tmp:/app/tmp
  - /srv/sites/site-x/data:/app/data
  - /srv/sites/site-x/logs:/app/logs

env:
  clear:
    NODE_ENV: production
    PORT: "5005"
    UPLOAD_DIR: /app/uploads
    DATA_DIR: /app/data
    LOG_DIR: /app/logs
